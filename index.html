<!doctype html>
<html lang="es">
  <head>

    <header class="site-header">
      <div class="header-inner">
        <a class="site-brand" href="#/inicio" aria-label="Ir al inicio">

            <strong>UNA</strong>
            <small>PUNO</small>
          </span>

    <script src="data.js"></script>
