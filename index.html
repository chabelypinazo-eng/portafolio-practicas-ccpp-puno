<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#063f82">
    <title>Portafolio de prácticas | Chabely Parizaca</title>
    <meta name="description" content="Portafolio de prácticas preprofesionales de Chabely Dianeth Parizaca Pinaso en el Colegio de Contadores Públicos de Puno.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#app">Saltar al contenido</a>

    <header class="site-header">
      <div class="header-inner">
        <a class="site-brand" href="#/inicio" aria-label="Ir al inicio">
          <span class="university-mark" aria-label="Universidad Nacional del Altiplano Puno">
            <strong>UNA</strong>
            <small>PUNO</small>
          </span>
          <span class="brand-divider" aria-hidden="true"></span>
          <img id="ccppLogo" alt="Colegio de Contadores Públicos de Puno">
        </a>

        <nav class="main-nav" aria-label="Navegación principal">
          <a href="#/inicio" data-nav="inicio">Inicio</a>
          <a href="#/ejes" data-nav="ejes">Ejes</a>
          <a href="#/actividades" data-nav="actividades">Actividades</a>
        </nav>
      </div>
    </header>

    <main id="app" tabindex="-1">
      <div class="app-loading" role="status">Preparando portafolio...</div>
    </main>

    <footer class="site-footer">
      <div>
        <strong>Chabely Dianeth Parizaca Pinaso</strong>
        <span>Comunicación Organizacional · 2026</span>
      </div>
      <a href="#/inicio">Volver al inicio</a>
    </footer>

    <div class="evidence-viewer" id="evidenceViewer" hidden aria-modal="true" role="dialog" aria-labelledby="viewerTitle">
      <header class="viewer-header">
        <div>
          <span id="viewerType">Evidencia</span>
          <strong id="viewerTitle">Visor de evidencias</strong>
        </div>
        <div class="viewer-tools">
          <span id="viewerCounter" aria-live="polite"></span>
          <a class="icon-button" id="openEvidenceFile" href="#" target="_blank" rel="noopener" aria-label="Abrir archivo original" title="Abrir archivo original">↗</a>
          <button class="icon-button" id="closeEvidenceViewer" type="button" aria-label="Cerrar visor" title="Cerrar">×</button>
        </div>
      </header>

      <div class="viewer-body">
        <button class="viewer-arrow viewer-previous" id="previousEvidence" type="button" aria-label="Evidencia anterior" title="Evidencia anterior">←</button>
        <div class="viewer-stage" id="viewerStage">
          <img id="viewerImage" alt="" hidden>
          <video id="viewerVideo" controls playsinline preload="metadata" hidden></video>

          <div class="pdf-book" id="pdfBook" hidden>
            <div class="book-pages" id="bookPages" aria-live="polite">
              <canvas id="pdfPageLeft"></canvas>
              <canvas id="pdfPageRight"></canvas>
            </div>
            <div class="book-controls">
              <button class="icon-button" id="previousPdfPage" type="button" aria-label="Páginas anteriores" title="Páginas anteriores">←</button>
              <span id="pdfPageStatus">Preparando documento...</span>
              <button class="icon-button" id="nextPdfPage" type="button" aria-label="Páginas siguientes" title="Páginas siguientes">→</button>
            </div>
          </div>

          <div class="viewer-loading" id="viewerLoading" role="status" hidden>Preparando evidencia...</div>
        </div>
        <button class="viewer-arrow viewer-next" id="nextEvidence" type="button" aria-label="Evidencia siguiente" title="Evidencia siguiente">→</button>
      </div>

      <footer class="viewer-footer">
        <p id="viewerCaption"></p>
        <span>Usa las flechas laterales para recorrer las evidencias.</span>
      </footer>
    </div>

    <noscript>Activa JavaScript para navegar por las actividades del portafolio.</noscript>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
